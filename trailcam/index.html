      text-decoration: none;
      font-size: 0.75rem;

      transition: color 0.2s;
      margin-bottom: 0.75rem;
    }
    .back-link:hover { color: #80A6BC; }
    .back-link svg { width: 14px; height: 14px; fill: currentColor; }

      letter-spacing: 0.12em;
      color: #80A6BC;
      margin-top: 0.5rem;
    }

    main { padding: 2rem; }

    .grid {
      columns: 3 280px;
      column-gap: 1rem;
    }

    .photo {
      break-inside: avoid;
      margin-bottom: 1rem;
      border-radius: 4px;
      overflow: hidden;
      background: #1c2028;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .photo:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .photo img { width: 100%; height: auto; display: block; }
    .photo figcaption {
      padding: 0.5rem 0.65rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.4);
    }

    .empty {
      color: rgba(255,255,255,0.3);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4rem;
      text-align: center;
    }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 3px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
      cursor: default;
    }
    #lightbox-close {
      position: absolute;
      top: 1.25rem; right: 1.5rem;
      background: none; border: none;
      color: rgba(255,255,255,0.5);
      font-size: 1.8rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s;
    }
    #lightbox-close:hover { color: #fff; }
    .lb-nav {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: rgba(255,255,255,0.4);
      font-size: 2.5rem;
      cursor: pointer;
      padding: 0 1rem;
      transition: color 0.15s;
      line-height: 1;
    }
    .lb-nav:hover { color: #fff; }
    #lb-prev { left: 0; }
    #lb-next { right: 0; }

    @media (max-width: 640px) {
      header { padding: 1.75rem 1.25rem 1.25rem; }
      main { padding: 1.25rem; }
      h1 { font-size: 1.8rem; }
      .grid { columns: 2 140px; column-gap: 0.6rem; }
      .photo { margin-bottom: 0.6rem; }
    }

<div id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button id="lightbox-close" aria-label="Close">&times;</button>
  <button class="lb-nav" id="lb-prev" aria-label="Previous">&#8249;</button>
  <img id="lb-img" src="" alt="Trail camera capture">
  <button class="lb-nav" id="lb-next" aria-label="Next">&#8250;</button>
</div>

<script>
  const lightbox = document.getElementById("lightbox");
  const lbImg    = document.getElementById("lb-img");
  const photos   = Array.from(document.querySelectorAll(".photo"));
  let current    = 0;

  function openLightbox(el) {
    current = photos.indexOf(el);
    lbImg.src = el.dataset.src;
    lbImg.alt = el.querySelector("img").alt;
    lightbox.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    lightbox.classList.remove("open");
    document.body.style.overflow = "";
    lbImg.src = "";
  }

  function navigate(dir) {
    current = (current + dir + photos.length) % photos.length;
    const el = photos[current];
    lbImg.src = el.dataset.src;
    lbImg.alt = el.querySelector("img").alt;
  }

  document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
  document.getElementById("lb-prev").addEventListener("click", function(e) { e.stopPropagation(); navigate(-1); });
  document.getElementById("lb-next").addEventListener("click", function(e) { e.stopPropagation(); navigate(1); });
  lightbox.addEventListener("click", function(e) { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener("keydown", function(e) {
    if (!lightbox.classList.contains("open")) return;
    if (e.key === "Escape")     closeLightbox();
    if (e.key === "ArrowLeft")  navigate(-1);
    if (e.key === "ArrowRight") navigate(1);
  });
</script>

</script>
