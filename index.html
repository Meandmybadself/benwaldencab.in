    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        [hidden] {
            display: none !important;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            /* Improve font rendering on iOS */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .hero-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* Use dynamic viewport height for mobile browsers */
            background: #C7C8CE;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            z-index: 3;
            color: white;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
        }

        .cabin-name {
            font-family: "Chronicle Display A", "Chronicle Display B", "Crimson Text", "Times New Roman", "Georgia", serif;
            font-style: normal;
            font-weight: 600;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .est-tag {
            font-family: "Ringside Narrow A", "Ringside Narrow B", "Work Sans", "Arial Narrow", "Arial", sans-serif;
            font-style: normal;
            font-weight: 400;
            font-size: 0.8rem;
            color: #FFF;
            text-transform: uppercase;
        }

        .icon-links {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .icon-link {
            display: inline-block;
            transition: all 0.3s ease;
        }

        .icon-link:hover {
            transform: translateY(-2px);
        }

        .icon-link svg {
            width: 24px;
            height: 24px;
            fill: white;
            filter: drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.5));
            display: block;
        }



        /* Responsive design */
        @media (max-width: 768px) {
            .content {
                /* Center content on mobile to avoid address bar issues */
                top: 50%;
                left: 50%;
                bottom: unset;
                transform: translate(-50%, -50%);
                text-align: center;
                width: 95%;
                max-width: 500px;
                padding: 0 1rem;
            }

            .cabin-name {
                font-size: 3.58rem; /* 10% bigger than 3.25rem (3.25 * 1.1) */
                margin-bottom: 1rem;
                flex-direction: column;
                align-items: center;
                gap: 0.5rem;
            }

            .est-tag {
                font-size: 1.04rem; /* 30% bigger than 0.8rem */
            }

            .icon-link svg {
                width: 28px;
                height: 28px;
            }

        }

        @media (max-width: 480px) {
            .content {
                /* Adjust for very small screens and notched devices */
                padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom) 1rem;
                width: 90%;
            }

            .cabin-name {
                font-size: 2.86rem; /* 10% bigger than 2.6rem (2.6 * 1.1) */
            }

            .est-tag {
                font-size: 0.91rem; /* 30% bigger than 0.7rem */
            }

            .icon-link svg {
                width: 26px;
                height: 26px;
            }
        }

        /* Specific adjustments for mobile browsers with dynamic UI */
        @media screen and (max-height: 700px) {
            .content {
                /* On shorter screens, ensure content is always visible */
                top: 45%;
            }
        }

        /* "Birds heard this week" section */
        .birds-section {
            background: #ece9e1;
            color: #2b3a33;
            padding: 4.5rem 1.5rem 5.5rem;
        }

        .birds-heading {
            font-family: "Chronicle Display A", "Chronicle Display B", "Crimson Text", "Georgia", serif;
            font-weight: 600;
            font-size: clamp(2rem, 5vw, 3rem);
            text-align: center;
            line-height: 1.1;
        }

        .birds-sub {
            font-family: "Ringside Narrow A", "Ringside Narrow B", "Work Sans", "Arial Narrow", sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.78rem;
            text-align: center;
            color: #74837a;
            margin-top: 0.7rem;
        }

        .birds-credit {
            font-family: "Work Sans", "Ringside Narrow A", "Helvetica Neue", "Arial", sans-serif;
            font-size: 0.82rem;
            line-height: 1.5;
            text-align: center;
            color: #8a958c;
            margin: 0.5rem auto 0;
            max-width: 34rem;
        }

        .birds-credit a {
            color: #4f6b62;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .birds-credit a:hover {
            color: #2b3a33;
        }

        .birds-grid {
            max-width: 1100px;
            margin: 2.75rem auto 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 2.25rem 1.5rem;
        }

        .bird-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin: 0;
        }

        .bird-thumb {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--ring, #cdd5d0);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.14);
            background: #dfe3df;
        }

        .bird-name {
            font-family: "Chronicle Display A", "Chronicle Display B", "Crimson Text", "Georgia", serif;
            font-weight: 600;
            font-size: 1.05rem;
            margin-top: 0.9rem;
            line-height: 1.2;
        }

        .bird-count {
            font-family: "Ringside Narrow A", "Ringside Narrow B", "Work Sans", "Arial Narrow", sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-size: 0.72rem;
            color: #7a8880;
            margin-top: 0.3rem;
        }

        @media (max-width: 480px) {
            .birds-grid {
                grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
                gap: 1.75rem 1rem;
            }

            .bird-thumb {
                width: 92px;
                height: 92px;
            }

            .bird-name {
                font-size: 0.95rem;

<body>
    <div class="hero-container">
        <img class="hero-image" src="bg.webp" alt="Benwalden Cabin on Gunflint Trail">
        <div class="content">
            <h1 class="cabin-name">
                <span id="benwalden-name" style="cursor: pointer;">Benwalden</span>
                <span class="est-tag">Est 2025</span>
            </h1>
            <div class="icon-links">
                <a href="https://maps.app.goo.gl/e8kJ8kEZbtJZNNMH6" target="_blank" rel="noopener noreferrer" class="icon-link" aria-label="View location on Google Maps">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                </a>
                <a href="/trailcam/" class="icon-link" aria-label="View trail camera footage">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                    </svg>
                </a>
                <a href="#birds" id="birds-link" class="icon-link" aria-label="Jump to birds heard this week" hidden>
                    <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M236.44,73.34,213.21,57.86A60,60,0,0,0,156,16h-.29C122.79,16.16,96,43.47,96,76.89V96.63L11.63,197.88l-.1.12A16,16,0,0,0,24,224h88A104.11,104.11,0,0,0,216,120V100.28l20.44-13.62a8,8,0,0,0,0-13.32ZM126.15,133.12l-60,72a8,8,0,1,1-12.29-10.24l60-72a8,8,0,1,1,12.29,10.24ZM164,80a12,12,0,1,1,12-12A12,12,0,0,1,164,80Z"/>
                    </svg>
                </a>
            </div>

        </div>
    </div>

    <section id="birds" class="birds-section" aria-labelledby="birds-heading" hidden>
        <h2 id="birds-heading" class="birds-heading">Birds heard this week</h2>
        <p class="birds-sub">Identified by sound around the cabin</p>
        <p class="birds-credit">Captured with <a href="https://www.birdweather.com/birdnetpi" target="_blank" rel="noopener noreferrer">BirdNET Pi</a> with data stored with <a href="https://app.birdweather.com/stations/28413" target="_blank" rel="noopener noreferrer">Birdweather</a>.</p>
        <div id="birds-grid" class="birds-grid"></div>
    </section>

    <script>
        const benwaldeName = document.getElementById('benwalden-name');
        
        benwaldeName.addEventListener('click', () => {
            const audio = new Audio('looncallalert.mp3');
            audio.play().catch(error => {
                console.log('Audio playback failed:', error);
            });
        });

        // Populate "Birds heard this week" from the BirdWeather proxy feed.
        // The section stays hidden unless the feed loads with birds, so the
        // page degrades to the plain splash if the feed is unavailable.
        (function loadBirds() {
            const FEED = 'https://birdweather.benwaldencab.in/species?period=week';

            fetch(FEED)
                .then((res) => (res.ok ? res.json() : Promise.reject(res.status)))
                .then((data) => {
                    const species = (data && data.species) || [];
                    const birds = species.filter((s) => s.thumbnailUrl);
                    if (!birds.length) return;

                    const grid = document.getElementById('birds-grid');
                    const frag = document.createDocumentFragment();

                    birds.forEach((s) => {
                        const card = document.createElement('figure');
                        card.className = 'bird-card';

                        const img = document.createElement('img');
                        img.className = 'bird-thumb';
                        img.src = s.thumbnailUrl;
                        img.alt = s.commonName || s.scientificName || 'Bird';
                        img.loading = 'lazy';
                        img.width = 120;
                        img.height = 120;
                        if (s.color) img.style.setProperty('--ring', s.color);

                        const name = document.createElement('figcaption');
                        name.className = 'bird-name';
                        name.textContent = s.commonName || s.scientificName || 'Unknown bird';

                        card.append(img, name);

                        const total = s.detections && s.detections.total;
                        if (total) {
                            const count = document.createElement('span');
                            count.className = 'bird-count';
                            count.textContent = total + (total === 1 ? ' call' : ' calls');
                            card.append(count);
                        }

                        frag.append(card);
                    });

                    grid.append(frag);
                    document.getElementById('birds').hidden = false;
                    const birdsLink = document.getElementById('birds-link');
                    if (birdsLink) birdsLink.hidden = false;
                })
                .catch((err) => console.log('Birds feed unavailable:', err));
        })();
    </script>
</body>
