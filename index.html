        const benwaldeName = document.getElementById('benwalden-name');
        
        benwaldeName.addEventListener('click', () => {
            const audio = new Audio('looncallalert.mp3');
            audio.play().catch(error => {
                console.log('Audio playback failed:', error);
            });
        });

        // Reveal the birds section (and its hero scroll-link) once any of its
        // feeds loads. Either the weekly grid or the "last bird heard" highlight
        // is enough to surface the section.
        function revealBirds() {
            const section = document.getElementById('birds');
            if (section) section.hidden = false;
            const link = document.getElementById('birds-link');
            if (link) link.hidden = false;
        }

        // Human-friendly relative time as a lowercase fragment ("just now",
        // "yesterday", "on Jul 1") for use after a word like "Heard". The
        // timestamp carries its own UTC offset, so Date parses it to an absolute
        // instant and the diff is timezone-safe.
        function timeAgo(iso) {
            const then = new Date(iso).getTime();
            if (!Number.isFinite(then)) return '';
            const secs = Math.max(0, Math.round((Date.now() - then) / 1000));
            if (secs < 45) return 'just now';
            const mins = Math.round(secs / 60);
            if (mins < 60) return mins <= 1 ? 'a minute ago' : mins + ' minutes ago';
            const hrs = Math.round(mins / 60);
            if (hrs < 24) return hrs <= 1 ? 'an hour ago' : hrs + ' hours ago';
            const days = Math.round(hrs / 24);
            if (days <= 1) return 'yesterday';
            if (days < 7) return days + ' days ago';
            return 'on ' + new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        // Populate "Birds heard this week" from the BirdWeather proxy feed.
        // The section stays hidden unless the feed loads with birds, so the
        // page degrades to the plain splash if the feed is unavailable.
        (function loadBirds() {
            const FEED = 'https://birdweather.benwaldencab.in/species?period=week';

            fetch(FEED)
                .then((res) => (res.ok ? res.json() : Promise.reject(res.status)))
                .then((data) => {
                    const species = (data && data.species) || [];
                    const birds = species.filter((s) => s.thumbnailUrl);
                    if (!birds.length) return;

                    const grid = document.getElementById('birds-grid');
                    const frag = document.createDocumentFragment();

                    birds.forEach((s) => {
                        const card = document.createElement('figure');
                        card.className = 'bird-card';

                        const img = document.createElement('img');
                        img.className = 'bird-thumb';
                        img.src = s.thumbnailUrl;
                        img.alt = s.commonName || s.scientificName || 'Bird';
                        img.loading = 'lazy';
                        img.width = 120;
                        img.height = 120;
                        if (s.color) img.style.setProperty('--ring', s.color);

                        const name = document.createElement('figcaption');
                        name.className = 'bird-name';
                        name.textContent = s.commonName || s.scientificName || 'Unknown bird';

                        card.append(img, name);

                        // Show the scientific name in italics when it adds info
                        // (skip if it's the only name we have and already shown).
                        if (s.scientificName && s.scientificName !== name.textContent) {
                            const sci = document.createElement('span');
                            sci.className = 'bird-sci';
                            sci.textContent = s.scientificName;
                            card.append(sci);
                        }

                        const total = s.detections && s.detections.total;
                        if (total) {
                            const count = document.createElement('span');
                            count.className = 'bird-count';
                            count.textContent = total + (total === 1 ? ' call' : ' calls');
                            card.append(count);
                        }

                        frag.append(card);
                    });

                    grid.append(frag);
                    revealBirds();
                })
                .catch((err) => console.log('Birds feed unavailable:', err));
        })();

        // Populate the "Last bird heard" highlight from the most recent
        // detection. Independent of the weekly grid, so the section surfaces even
        // if the weekly species feed is empty.
        (function loadLastBird() {
            const FEED = 'https://birdweather.benwaldencab.in/detections?limit=1';

            fetch(FEED)
                .then((res) => (res.ok ? res.json() : Promise.reject(res.status)))
                .then((data) => {
                    const detection = data && data.detections && data.detections[0];
                    const species = detection && detection.species;
                    if (!detection || !species) return;

                    const el = document.getElementById('last-bird');
                    const img = el.querySelector('.last-bird-thumb');
                    const thumb = species.thumbnailUrl || species.imageUrl;
                    const name = species.commonName || species.scientificName || 'Unknown bird';

                    if (thumb) {
                        img.src = thumb;
                        img.alt = name;
                        if (species.color) img.style.setProperty('--ring', species.color);
                    } else {
                        img.hidden = true;
                    }

                    el.querySelector('.last-bird-name').textContent = name;

                    const sci = el.querySelector('.last-bird-sci');
                    if (species.scientificName && species.scientificName !== name) {
                        sci.textContent = species.scientificName;
                    } else {
                        sci.hidden = true;
                    }

                    const time = el.querySelector('.last-bird-time');
                    const label = timeAgo(detection.timestamp);
                    if (label) time.textContent = 'Heard ' + label;
                    else time.hidden = true;

                    el.hidden = false;
                    revealBirds();
                })
                .catch((err) => console.log('Last bird unavailable:', err));
        })();

        // Populate "Local Businesses" from the Cabin OS public feed. Like the
        // birds section, the whole thing stays hidden unless the feed loads with
        // at least one business, so the page degrades to the plain splash.
        (function loadBusinesses() {
            const FEED = 'https://admin.benwaldencab.in/api/public/businesses';

            const DAYS = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
            const DAY_LABELS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

            const esc = (s) => String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
            const mapsUrl = (a) => 'https://maps.google.com/?q=' + encodeURIComponent(a);
            // Normalize a stored website into a safe absolute http(s) link:
            // bare domains get https://, and non-http schemes (javascript:, etc.) are dropped.
            function safeUrl(u) {
                const s = String(u == null ? '' : u).trim();
                if (!s) return '';
                if (/^https?:\/\//i.test(s)) return s;
                if (/^[a-z][a-z0-9+.-]*:/i.test(s)) return '';
                return 'https://' + s;
            }

            // All open/closed reasoning happens in Central Time so the status
            // reflects the cabin's locale regardless of the visitor's timezone.
            function nowCT() {
                const ct = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' }));
                return { month: ct.getMonth() + 1, dow: ct.getDay(), minuteOfDay: ct.getHours() * 60 + ct.getMinutes() };
            }
            function todayStr() {
                const ct = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' }));
                return ct.getFullYear() + '-' + String(ct.getMonth() + 1).padStart(2, '0') + '-' + String(ct.getDate()).padStart(2, '0');
            }
            const parseTime = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
            function fmt12(t) {
                const [h, m] = t.split(':').map(Number);
                const h12 = h % 12 || 12, ampm = h >= 12 ? 'pm' : 'am';
                return m === 0 ? `${h12}${ampm}` : `${h12}:${String(m).padStart(2, '0')}${ampm}`;
            }
            function isOpenNow(hours, closedMonths, closures) {
                const now = nowCT();
                if (closures.includes(todayStr())) return { status: 'closed', label: 'Closed today' };
                if (closedMonths.includes(now.month)) return { status: 'closed', label: `Closed for ${MONTH_NAMES[now.month - 1]}` };

                const todaySlot = hours[DAYS[now.dow]];
                if (todaySlot) {
                    const openMins = parseTime(todaySlot.open), closeMins = parseTime(todaySlot.close);
                    if (now.minuteOfDay >= openMins && now.minuteOfDay < closeMins) return { status: 'open', label: 'Open' };
                    if (now.minuteOfDay < openMins) return { status: 'closed', label: `Closed until ${fmt12(todaySlot.open)}` };
                }
                for (let i = 1; i <= 7; i++) {
                    const nextDow = (now.dow + i) % 7;
                    const slot = hours[DAYS[nextDow]];
                    if (slot) return { status: 'closed', label: `Closed until ${DAY_LABELS[nextDow].slice(0, 3)} ${fmt12(slot.open)}` };
                }
                return { status: 'closed', label: 'Closed' };
            }

            // ── View state ──
            let all = [];
            let searchQuery = '';
            let activeCategory = null;
            let filterOpenNow = false;

            const listEl = document.getElementById('biz-list');
            const chipsEl = document.getElementById('biz-chips');

            function renderChips() {
                const categories = [...new Set(all.map((b) => b.category).filter(Boolean))].sort();
                chipsEl.innerHTML = '';

                const openChip = document.createElement('button');
                openChip.type = 'button';
                openChip.className = 'biz-chip' + (filterOpenNow ? ' active' : '');
                openChip.textContent = 'Open now';
                openChip.addEventListener('click', () => { filterOpenNow = !filterOpenNow; renderChips(); render(); });
                chipsEl.appendChild(openChip);

                categories.forEach((cat) => {
                    const chip = document.createElement('button');
                    chip.type = 'button';
                    chip.className = 'biz-chip' + (activeCategory === cat ? ' active' : '');
                    chip.textContent = cat;
                    chip.addEventListener('click', () => { activeCategory = activeCategory === cat ? null : cat; renderChips(); render(); });
                    chipsEl.appendChild(chip);
                });
            }

            function detailHtml(b) {
                const hours = b.hours || {}, closedMonths = b.closed_months || [], closures = b.closures || [];
                const now = nowCT();

                const meta = [];
                if (b.address) meta.push(`<a href="${esc(mapsUrl(b.address))}" target="_blank" rel="noopener noreferrer">Directions</a>`);
                if (b.phone) meta.push(`<a href="tel:${esc(b.phone)}">${esc(b.phone)}</a>`);
                const site = safeUrl(b.website);
                if (site) meta.push(`<a href="${esc(site)}" target="_blank" rel="noopener noreferrer">Website</a>`);

                const hoursRows = DAYS.map((d, i) => {
                    const slot = hours[d], today = i === now.dow ? ' today' : '';
                    const time = slot ? `${fmt12(slot.open)} – ${fmt12(slot.close)}` : 'Closed';
                    return `<span class="day${today}">${DAY_LABELS[i]}</span><span class="time${today}">${time}</span>`;
                }).join('');

                return `
                    ${b.description ? `<p class="biz-desc">${esc(b.description)}</p>` : ''}
                    ${(b.tags || []).length ? `<div class="biz-tags">${b.tags.map((t) => `<span class="biz-tag">${esc(t)}</span>`).join('')}</div>` : ''}
                    ${meta.length ? `<div class="biz-meta">${meta.join('')}</div>` : ''}
                    ${Object.keys(hours).length ? `<div class="biz-hours">${hoursRows}</div>` : ''}
                    ${closedMonths.length ? `<p class="biz-note">Closed for ${closedMonths.map((m) => MONTH_NAMES[m - 1]).join(', ')}</p>` : ''}
                    ${closures.length ? `<p class="biz-note">Closed on ${closures.slice().sort().join(', ')}</p>` : ''}`;
            }

            function itemHtml(b) {
                const hours = b.hours || {}, closedMonths = b.closed_months || [], closures = b.closures || [];
                const hasHours = Object.keys(hours).length || closedMonths.length || closures.length;
                const status = hasHours ? isOpenNow(hours, closedMonths, closures) : null;
                const hasDetails = hasHours || b.description || b.address || b.phone || b.website || (b.tags || []).length;

                const chevron = hasDetails
                    ? `<svg class="biz-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="4,6 8,10 12,6"/></svg>`
                    : '<span class="biz-chevron"></span>';

                return `
                    <div class="biz-item" data-id="${esc(b.id)}">
                        <div class="biz-row"${hasDetails ? ' role="button" tabindex="0" aria-expanded="false"' : ''}>
                            <span class="biz-name">${esc(b.name)}</span>
                            ${status ? `<span class="biz-status ${status.status}">${esc(status.label)}</span>` : ''}
                            ${chevron}
                        </div>
                        ${hasDetails ? `<div class="biz-detail">${detailHtml(b)}</div>` : ''}
                    </div>`;
            }

            function render() {
                let items = all;
                if (searchQuery) {
                    items = items.filter((b) =>
                        (b.name || '').toLowerCase().includes(searchQuery) ||
                        (b.category || '').toLowerCase().includes(searchQuery) ||
                        (b.description || '').toLowerCase().includes(searchQuery));
                }
                if (activeCategory) items = items.filter((b) => b.category === activeCategory);
                if (filterOpenNow) {
                    items = items.filter((b) => {
                        const hours = b.hours || {};
                        if (!Object.keys(hours).length && !(b.closed_months || []).length && !(b.closures || []).length) return false;
                        return isOpenNow(hours, b.closed_months || [], b.closures || []).status === 'open';
                    });
                }

                if (!items.length) {
                    listEl.innerHTML = '<p class="biz-empty">No businesses match.</p>';
                    return;
                }

                // Group by category, preserving the feed's category order.
                const byCategory = new Map();
                items.forEach((b) => {
                    const key = b.category || '';
                    if (!byCategory.has(key)) byCategory.set(key, []);
                    byCategory.get(key).push(b);
                });

                listEl.innerHTML = [...byCategory.entries()].map(([cat, group]) => {
                    const sorted = group.slice().sort((a, b) => a.name.localeCompare(b.name));
                    return (cat ? `<div class="biz-cat">${esc(cat)}</div>` : '') + sorted.map(itemHtml).join('');
                }).join('');

                listEl.querySelectorAll('.biz-item').forEach((item) => {
                    const row = item.querySelector('.biz-row[role="button"]');
                    if (!row) return;
                    const toggle = () => {
                        const open = item.classList.toggle('expanded');
                        row.setAttribute('aria-expanded', open ? 'true' : 'false');
                    };
                    row.addEventListener('click', toggle);
                    row.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
                    });
                });
            }

            document.getElementById('biz-search').addEventListener('input', (e) => {
                searchQuery = e.target.value.trim().toLowerCase();
                render();
            });

            fetch(FEED)
                .then((res) => (res.ok ? res.json() : Promise.reject(res.status)))
                .then((data) => {
                    all = (Array.isArray(data) ? data : []).filter((b) => b && b.name);
                    if (!all.length) return;

                    renderChips();
                    render();
                    document.getElementById('businesses').hidden = false;
                    const link = document.getElementById('businesses-link');
                    if (link) link.hidden = false;
                })
                .catch((err) => console.log('Businesses feed unavailable:', err));
        })();
    </script>
</body>
</html>
